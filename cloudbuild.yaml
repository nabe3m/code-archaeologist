# push → Cloud Run デプロイの最小 CD。
# セットアップ: Artifact Registry リポジトリ "app"（asia-northeast1）と
# Secret Manager の gemini-api-key / github-token を事前に作成しておく。
substitutions:
  _REGION: asia-northeast1
  _SERVICE: code-archaeologist
  _IMAGE: asia-northeast1-docker.pkg.dev/${PROJECT_ID}/app/code-archaeologist

steps:
  - name: gcr.io/cloud-builders/docker
    args: ["build", "-t", "${_IMAGE}:${SHORT_SHA}", "-t", "${_IMAGE}:latest", "."]
  - name: gcr.io/cloud-builders/docker
    args: ["push", "--all-tags", "${_IMAGE}"]
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_IMAGE}:${SHORT_SHA}
      - --region=${_REGION}
      - --allow-unauthenticated
      - --set-secrets=GEMINI_API_KEY=gemini-api-key:latest,GITHUB_TOKEN=github-token:latest
      - --memory=1Gi
      - --timeout=300

images:
  - ${_IMAGE}:${SHORT_SHA}
  - ${_IMAGE}:latest
