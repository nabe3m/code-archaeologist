# push → Cloud Run デプロイの最小 CD。
# セットアップ: Artifact Registry リポジトリ "app"（asia-northeast1）と
# Secret Manager の gemini-api-key / github-token を事前に作成しておく。
substitutions:
  _REGION: asia-northeast1
  _SERVICE: code-archaeologist

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/app/${_SERVICE}:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/app/${_SERVICE}:latest
      - .
  # :latest はここで evals ゲートより前に push されるため、ゲート失敗時も上書きされる
  # (デプロイは $SHORT_SHA 固定なので本番は安全。:latest を直接デプロイしないこと)
  - name: gcr.io/cloud-builders/docker
    args: ["push", "--all-tags", "${_REGION}-docker.pkg.dev/$PROJECT_ID/app/${_SERVICE}"]
  # 品質ゲート: プロンプト/モデル変更のデグレをデプロイ前に検出する。
  # LLM のゆらぎで 5/5 が 4/5 になることがあるため合格ラインは 4。
  - name: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    id: evals-gate
    entrypoint: sh
    args:
      - -c
      - uv sync --frozen --no-dev && uv run --no-sync python evals/run.py --min-pass 4
    secretEnv: ["GEMINI_API_KEY", "GITHUB_TOKEN"]
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/app/${_SERVICE}:$SHORT_SHA
      - --region=${_REGION}
      - --allow-unauthenticated
      - --set-secrets=GEMINI_API_KEY=gemini-api-key:latest,GITHUB_TOKEN=github-token:latest
      # LLM は Vertex AI 経由（鍵レス）。問題時は GOOGLE_GENAI_USE_VERTEXAI=false で
      # 上の API キー（フォールバックとして残置）に即戻せる
      # 監査(GitHub 書き込み)は許可 repo のみ。公開エンドポイントを匿名で叩かれても
      # 共有トークンで任意 repo に PR 乱造されない。dig(読み取り)は制限しない
      - --set-env-vars=GOOGLE_GENAI_USE_VERTEXAI=true,GOOGLE_CLOUD_PROJECT=code-archaeologist-hackathon,GOOGLE_CLOUD_LOCATION=global,AUDIT_WRITE_ALLOWLIST=nabe3m/demo-repo
      - --memory=1Gi
      - --timeout=300
      # 匿名コストの総量上限: インスタンス内スロットリング（DIG_MAX_CONCURRENT /
      # DIG_PER_IP_PER_MIN）× インスタンス数上限で、公開デモの LLM コストを頭打ちにする
      - --max-instances=3

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/app/${_SERVICE}:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/app/${_SERVICE}:latest

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/gemini-api-key/versions/latest
      env: GEMINI_API_KEY
    - versionName: projects/$PROJECT_ID/secrets/github-token/versions/latest
      env: GITHUB_TOKEN

# evals は 5 問 × 多段 LLM 調査で数分かかる
timeout: 1800s
